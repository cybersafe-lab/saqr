name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PHP ${{ matrix.php }} — lint + composer validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json, curl
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Lint all PHP files
        run: find src examples -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Validate corpus JSON
        run: php -r 'json_decode(file_get_contents("corpus/frameworks.json"), true, 512, JSON_THROW_ON_ERROR);'
