name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  php:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3"]   # 8.1 dropped — Pest 3 requires PHP 8.2+
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: shivammathur/setup-php@8358ee0e2e8afe63c2fb8253d1d52085811ab1e5  # v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - run: composer install --prefer-dist --no-progress
      - run: vendor/bin/pest --testsuite=Unit,Characterization,Snapshot,Smoke,Eval

  node:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ matrix.node }}
      - uses: shivammathur/setup-php@8358ee0e2e8afe63c2fb8253d1d52085811ab1e5  # v2
        with:
          php-version: "8.3"
          coverage: none
      - working-directory: mcp
        run: npm ci && npm run build && npm test

  integration:
    name: Integration (CLI contract + MCP tools/call)
    runs-on: ubuntu-latest
    needs: [php, node]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: shivammathur/setup-php@8358ee0e2e8afe63c2fb8253d1d52085811ab1e5  # v2
        with: { php-version: "8.3" }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with: { node-version: "20" }
      - run: composer install --prefer-dist --no-progress
      - run: vendor/bin/pest --testsuite=Integration
      - working-directory: mcp
        run: npm ci && npm run build && npm test

  corpus-lint:
    name: Corpus lint (SEC-007)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: shivammathur/setup-php@8358ee0e2e8afe63c2fb8253d1d52085811ab1e5  # v2
        with: { php-version: "8.3" }
      - run: php bin/corpus-lint
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with: { node-version: "20" }
      - name: Bundle and assert corpus copy matches source
        working-directory: mcp
        run: |
          node scripts/bundle.mjs
          diff -q ../corpus/frameworks.json vendor-bundled/corpus/frameworks.json
