name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish:
    name: Publish npm + Docker
    runs-on: ubuntu-latest
    environment: release   # requires manual approval per repo settings
    permissions:
      contents: write   # for GH Release
      id-token: write   # for npm --provenance + cosign keyless
      packages: write   # for GHCR push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: shivammathur/setup-php@8358ee0e2e8afe63c2fb8253d1d52085811ab1e5
        with:
          php-version: "8.3"
      - working-directory: mcp
        run: npm ci && npm run build

      - name: Publish to npm with provenance
        working-directory: mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: docker build -t ghcr.io/${{ github.repository_owner }}/saqr-mcp:${{ github.ref_name }} -t ghcr.io/${{ github.repository_owner }}/saqr-mcp:latest .
      - run: docker push ghcr.io/${{ github.repository_owner }}/saqr-mcp:${{ github.ref_name }}
      - run: docker push ghcr.io/${{ github.repository_owner }}/saqr-mcp:latest

      - uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159
      - name: Sign Docker image with cosign keyless
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/saqr-mcp:${{ github.ref_name }}
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/saqr-mcp:latest

      - name: Create GH Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          generate_release_notes: true
